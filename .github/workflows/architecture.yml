# Generated by Architect Companion. Edit .architect-companion/ instead.
name: Architecture
on:
  pull_request: {}
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  architecture:
    name: Architecture checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify generated architecture targets
        run: npx --no-install architect-companion render --check
      - name: Run dependency-cruiser architecture checks
        run: npx --no-install depcruise --config .dependency-cruiser.cjs src src/checks src/diagnostics src/init src/integrations src/io src/model src/render src/renderers src/targets
